<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Harness Feedback Loop</title>
  <desc id="desc">Cyclic process of plan, act, validate, and repair for AI agents.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>

  <circle cx="600" cy="360" r="210" fill="#eef2ff" stroke="#4338ca" stroke-width="3"/>

  <rect x="500" y="150" width="200" height="80" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="565" y="200" font-family="Arial, sans-serif" font-size="28" fill="#1e3a8a" font-weight="bold">Plan</text>

  <rect x="800" y="310" width="220" height="80" rx="12" fill="#cffafe" stroke="#0e7490" stroke-width="3"/>
  <text x="885" y="360" font-family="Arial, sans-serif" font-size="28" fill="#155e75" font-weight="bold">Act</text>

  <rect x="500" y="500" width="260" height="80" rx="12" fill="#fee2e2" stroke="#b91c1c" stroke-width="3"/>
  <text x="548" y="550" font-family="Arial, sans-serif" font-size="28" fill="#7f1d1d" font-weight="bold">Validate</text>

  <rect x="170" y="310" width="230" height="80" rx="12" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
  <text x="236" y="360" font-family="Arial, sans-serif" font-size="28" fill="#14532d" font-weight="bold">Repair</text>

  <path d="M700 190 C780 210, 850 260, 900 320" fill="none" stroke="#475569" stroke-width="4"/>
  <polygon points="912,332 896,333 904,320" fill="#475569"/>

  <path d="M910 390 C900 450, 830 520, 740 540" fill="none" stroke="#475569" stroke-width="4"/>
  <polygon points="726,545 739,535 740,551" fill="#475569"/>

  <path d="M500 540 C400 530, 320 470, 280 390" fill="none" stroke="#475569" stroke-width="4"/>
  <polygon points="274,375 287,385 272,391" fill="#475569"/>

  <path d="M280 310 C320 240, 400 185, 500 190" fill="none" stroke="#475569" stroke-width="4"/>
  <polygon points="514,192 501,198 501,182" fill="#475569"/>

  <text x="350" y="650" font-family="Arial, sans-serif" font-size="20" fill="#334155">Goal: convert failures into structured feedback, then iterate until stable completion.</text>
</svg>

