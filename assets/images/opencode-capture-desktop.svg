<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode Desktop App - illustrative capture</title>
  <desc id="desc">Illustrative desktop app capture generated for documentation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .title{font:700 32px 'Segoe UI',Arial,sans-serif; fill:#e2e8f0}
      .sub{font:500 18px 'Segoe UI',Arial,sans-serif; fill:#94a3b8}
      .txt{font:500 16px 'Segoe UI',Arial,sans-serif; fill:#cbd5e1}
      .mono{font:500 15px Consolas,monospace; fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="90" y="80" width="1100" height="600" rx="16" fill="#0b1220" stroke="#334155"/>
  <rect x="90" y="80" width="1100" height="46" rx="16" fill="#111827"/>
  <circle cx="122" cy="103" r="7" fill="#ef4444"/><circle cx="146" cy="103" r="7" fill="#f59e0b"/><circle cx="170" cy="103" r="7" fill="#22c55e"/>
  <text x="640" y="109" text-anchor="middle" class="txt">OpenCode Desktop (illustrative)</text>

  <rect x="120" y="145" width="250" height="510" fill="#111827" stroke="#1f2937"/>
  <text x="140" y="176" class="txt">Sessions</text>
  <rect x="136" y="195" width="218" height="72" rx="8" fill="#1e293b"/>
  <text x="148" y="220" class="txt">Feature rollout</text>
  <text x="148" y="242" class="sub">gpt-5.5 • 42 turns</text>

  <rect x="390" y="145" width="770" height="510" fill="#0f172a" stroke="#1e293b"/>
  <text x="420" y="180" class="title">Desktop App Workflow</text>
  <text x="420" y="214" class="sub">Model: opencode/zen • Project: ai-engineering.git</text>
  <text x="420" y="268" class="txt">- Review repository map and open pending files.</text>
  <text x="420" y="300" class="txt">- Draft documentation updates.</text>
  <text x="420" y="332" class="txt">- Sync architecture notes with benchmarks pages.</text>

  <rect x="420" y="380" width="710" height="120" rx="10" fill="#111827" stroke="#334155"/>
  <text x="442" y="413" class="mono">You: add OpenCode usage modes and screenshots to opencode.md</text>
  <text x="442" y="444" class="mono">Assistant: found official modes and prepared page update.</text>
  <text x="442" y="475" class="mono">Assistant: attached screenshots and references.</text>

  <text x="640" y="730" text-anchor="middle" class="sub">Generated illustrative capture for documentation</text>
</svg>
