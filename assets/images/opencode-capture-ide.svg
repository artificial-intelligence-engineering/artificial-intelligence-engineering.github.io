<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode IDE Extension - illustrative capture</title>
  <desc id="desc">Illustrative VS Code extension capture generated for documentation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <style>
      .title{font:700 30px 'Segoe UI',Arial,sans-serif; fill:#e2e8f0}
      .sub{font:500 17px 'Segoe UI',Arial,sans-serif; fill:#93c5fd}
      .txt{font:500 16px 'Segoe UI',Arial,sans-serif; fill:#cbd5e1}
      .mono{font:500 15px Consolas,monospace; fill:#e2e8f0}
    </style>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="70" y="70" width="1140" height="620" rx="14" fill="#0b1220" stroke="#334155"/>
  <rect x="70" y="70" width="1140" height="44" rx="14" fill="#1f2937"/>
  <text x="640" y="99" text-anchor="middle" class="txt">VS Code + OpenCode extension (illustrative)</text>

  <rect x="86" y="126" width="64" height="548" fill="#111827"/>
  <rect x="160" y="126" width="290" height="548" fill="#0f172a" stroke="#1f2937"/>
  <text x="180" y="156" class="txt">EXPLORER</text>
  <text x="180" y="186" class="mono">_pages/opencode.md</text>
  <text x="180" y="214" class="mono">assets/images/...</text>

  <rect x="460" y="126" width="490" height="548" fill="#0b1220" stroke="#1f2937"/>
  <text x="480" y="156" class="title">opencode.md</text>
  <text x="480" y="188" class="mono">## Ways to use OpenCode</text>
  <text x="480" y="218" class="mono">1. CLI / TUI</text>
  <text x="480" y="248" class="mono">2. Desktop App (Beta)</text>
  <text x="480" y="278" class="mono">3. IDE Extension (VS Code)</text>

  <rect x="960" y="126" width="234" height="548" fill="#111827" stroke="#1f2937"/>
  <text x="977" y="156" class="txt">OpenCode Panel</text>
  <rect x="974" y="174" width="206" height="146" rx="8" fill="#1e293b"/>
  <text x="985" y="204" class="sub">Quick Launch</text>
  <text x="985" y="230" class="txt">Ctrl+Esc</text>
  <text x="985" y="256" class="txt">New Session</text>
  <text x="985" y="282" class="txt">Ctrl+Shift+Esc</text>

  <text x="640" y="728" text-anchor="middle" class="sub">Generated illustrative capture for documentation</text>
</svg>
